<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ProjectAssistant{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">ProjectAssistant</p>
                <h1 class="brand-title">Sinan icin mesaj asistani</h1>
            </div>
            <nav class="topnav">
                {% if is_authenticated %}
                <a href="/console">Ana Sayfa</a>
                <a href="/settings/general">Genel Ayarlar</a>
                <a href="/settings/telegram">Telegram Ayarlari</a>
                <a href="/settings/teams">Teams Ayarlari</a>
                <a href="/logout">Cikis</a>
                {% else %}
                <a href="/login">Giris</a>
                {% endif %}
                <a href="/health" target="_blank" rel="noreferrer">Health</a>
            </nav>
        </header>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
